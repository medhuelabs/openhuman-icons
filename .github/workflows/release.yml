name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.1
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      - run: pnpm docs:build
      - name: Set package versions from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          pnpm --filter @medhuelabs/openhuman-icons version "$VERSION" --no-git-tag-version
          pnpm --filter @medhuelabs/openhuman-icons-react version "$VERSION" --no-git-tag-version
      - run: pnpm --filter @medhuelabs/openhuman-icons publish --access public --no-git-checks
        env:
          NPM_CONFIG_PROVENANCE: true
      - run: pnpm --filter @medhuelabs/openhuman-icons-react publish --access public --no-git-checks
        env:
          NPM_CONFIG_PROVENANCE: true
      - name: Package canonical SVG files
        run: zip -j openhuman-icons-${GITHUB_REF_NAME}.zip icons/*.svg
      - uses: softprops/action-gh-release@v2
        with:
          files: openhuman-icons-${{ github.ref_name }}.zip
